<!DOCTYPE html>
<html>
<head>

<title>FLOW Tournament</title>

<link rel="stylesheet" href="style.css">

<body>

<div id="homePage">

<div class="banner">
    <img src="banner.png" alt="FLOW Tournament Banner">
</div>



 <divclass="categories">

</div>

<div class="category-card">
<img src="cs.png">
<h3>Classic Squad</h3>

</div>

<div class="category-card">
<img src="lw.png">
<h3>Lone Wolf</h3>
<p>5 Live Matches</p>
</div>

<div class="category-card">
<img src="other.png">
<h3>Other</h3>
<p>3 Live Matches</p>
</div>

<

</div>

<div id="walletPage" class="hidden">
    <h2>💰 Wallet</h2>
    <p>Balance: ৳100</p>
</div>

<div id="profilePage" class="hidden">

<h2>👤 Profile</h2>

<p id="profileName"></p>

<input
type="text"
id="uidInput"
placeholder="Enter Free Fire UID">

<button onclick="saveUID()">
Save UID
</button>

<p id="savedUID"></p>

</div>
<div id="roomPage" class="hidden">

<h2>🎮 Match Room</h2>

<p id="showRoomId">
Room ID: 12345678
</p>

<button onclick="copyRoomId()">
📋 Copy Room ID
</button>

<p id="showRoomPass">
Password: FLOW123
</p>

<button onclick="copyRoomPass()">
📋 Copy Password
</button>

</div>
<div id="matchesPage" class="hidden">

<h2>🏆 My Matches</h2>

<div class="tournament">

<h3>FREE FIRE SOLO</h3>

<p>📅 Date: 20 June</p>

<p>⏰ Time: 8:00 PM</p>

<p>🟢 Status: Upcoming</p>

</div>

</div>

<div class="bottom-nav">
    <button onclick="showPage('home')">🏠</button>
    <button onclick="showPage('wallet')">💰</button>
    <button onclick="showPage('profile')">👤</button>
    <button onclick="showPage('room')">🎮</button>
    <button onclick="showPage('matches')">🏆</button>
</div>

<script src="script.js"></script>

</body>
